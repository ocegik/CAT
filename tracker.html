<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CAT Prep — QA Tracker</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── PAGE HEADER ── */
    .page-header { margin-bottom: 28px; }
    .page-header h1 {
      font-family: "Inter", sans-serif;
      font-size: 26px; font-weight: 700;
      letter-spacing: -0.5px; line-height: 1.1;
    }
    .page-header h1 span { color: var(--amber); }
    .page-header p { font-size: 13px; color: var(--text3); margin-top: 4px; }

    /* ── DUAL TRACKER CARDS ── */
    .tracker-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    @media(max-width:520px) { .tracker-cards { grid-template-columns:1fr; } }

    .tracker-card { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
    .tc-label { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--text3); margin-bottom:12px; display:flex; align-items:center; gap:6px; }
    .tc-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .tc-dot-amber { background: var(--amber); }
    .tc-dot-teal  { background: var(--teal); }
    .tc-numbers { display:flex; align-items:flex-end; gap:6px; margin-bottom:14px; }
    .tc-big { font-family:"Inter",sans-serif; font-size:34px; font-weight:700; line-height:1; letter-spacing:-0.5px; }
    .tc-big-amber { color:var(--amber); }
    .tc-big-teal  { color:var(--teal); }
    .tc-slash { font-size:20px; color:var(--text3); font-weight:300; padding-bottom:2px; }
    .tc-total { font-size:20px; color:var(--text2,rgba(255,255,255,0.6)); font-weight:500; padding-bottom:2px; }
    .tc-unit  { font-size:12px; color:var(--text3); padding-bottom:4px; margin-left:2px; }
    .tc-bar-track { height:8px; background:rgba(255,255,255,0.07); border-radius:4px; overflow:hidden; }
    .tc-bar-fill  { height:100%; border-radius:4px; transition:width 0.5s; }
    .tc-bar-amber { background: linear-gradient(90deg,#b87a10,var(--amber)); }
    .tc-bar-teal  { background: linear-gradient(90deg,#0e9870,var(--teal)); }
    .tc-sub { font-size:11px; color:var(--text3); margin-top:7px; }
    .tc-sub strong { color: rgba(255,255,255,0.6); }

    /* ── ACTIONS ── */
    .top-actions { display:flex; justify-content:flex-end; margin-bottom:16px; }
    .reset-btn {
      font-size:12px; padding:7px 16px; border-radius:30px;
      border:1px solid rgba(239,68,68,0.3); background:transparent;
      color:#f87171; cursor:pointer; font-family:"Inter",sans-serif;
      font-weight:500; transition: all 0.2s;
    }
    .reset-btn:hover { background:rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.5); }

    /* ── FILTER ── */
    .filter-row { display:flex; gap:7px; margin-bottom:18px; flex-wrap:wrap; }
    .filter-btn {
      font-size:12px; font-weight:500; padding:6px 14px; border-radius:30px;
      border:1px solid var(--border2); background:transparent;
      color:rgba(255,255,255,0.55); cursor:pointer; font-family:"Inter",sans-serif;
      transition: all 0.18s; white-space:nowrap;
    }
    .filter-btn:hover  { border-color:rgba(245,166,35,0.4); color:var(--amber); }
    .filter-btn.active { background:rgba(245,166,35,0.12); color:var(--amber); border-color:rgba(245,166,35,0.4); }

    /* ── PHASE BLOCKS ── */
    .phase-block { margin-bottom:10px; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:border-color 0.2s; }
    .phase-block:hover { border-color: var(--border2); }

    .phase-hdr { display:flex; align-items:center; gap:10px; padding:14px 18px; cursor:pointer; background:rgba(255,255,255,0.04); transition:background 0.15s; }
    .phase-hdr:hover { background: rgba(255,255,255,0.07); }
    .ph-badge { font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; white-space:nowrap; font-family:"Inter",sans-serif; letter-spacing:0.02em; }
    .ph-title { font-family:"Inter",sans-serif; font-size:15px; font-weight:600; color:var(--text); flex:1; letter-spacing:-0.1px; }
    .ph-meta  { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
    .ph-vid-prog  { font-size:12px; font-weight:500; color:var(--amber); }
    .ph-time-prog { font-size:11px; color:var(--teal); }
    .ph-chev { font-size:16px; color:var(--text3); transition:transform 0.25s; margin-left:4px; flex-shrink:0; }
    .ph-chev.open { transform: rotate(90deg); }

    .phase-bars { padding:0 18px 12px; background:rgba(255,255,255,0.04); display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .phase-bar-wrap  { display:flex; flex-direction:column; gap:3px; }
    .phase-bar-lbl   { font-size:10px; color:var(--text3); letter-spacing:0.04em; text-transform:uppercase; }
    .phase-bar-track { height:4px; background:rgba(255,255,255,0.07); border-radius:2px; overflow:hidden; }
    .phase-bar-fill-a { height:100%; border-radius:2px; background:linear-gradient(90deg,#b87a10,var(--amber)); transition:width 0.4s; }
    .phase-bar-fill-t { height:100%; border-radius:2px; background:linear-gradient(90deg,#0e9870,var(--teal)); transition:width 0.4s; }

    /* ── SECTION & VIDEO ROWS ── */
    .section-body { padding:0 18px 14px; background: var(--bg); }
    .section-title { font-size:10px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.08em; padding:12px 0 6px; border-top:1px solid var(--border); margin-top:2px; }
    .section-title:first-child { border-top:none; margin-top:0; padding-top:10px; }

    .video-row { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
    .video-row:last-child { border-bottom:none; }
    .video-row input[type=checkbox] { width:17px; height:17px; cursor:pointer; accent-color:var(--amber); flex-shrink:0; }
    .video-label { font-size:14px; color:rgba(255,255,255,0.6); flex:1; line-height:1.4; cursor:pointer; transition:color 0.15s; }
    .video-label:hover { color: var(--text); }
    .video-label.done  { text-decoration:line-through; color:var(--text3); }
    .vid-dur  { font-size:11px; color:var(--text3); white-space:nowrap; background:rgba(255,255,255,0.05); padding:2px 7px; border-radius:20px; font-weight:500; }
    .no-dur   { opacity:0.4; }
    .here-badge { font-size:10px; padding:2px 7px; background:rgba(245,166,35,0.15); color:var(--amber); border-radius:10px; white-space:nowrap; margin-left:6px; border:1px solid rgba(245,166,35,0.25); }

    @media(max-width:600px) {
      .phase-hdr { padding: 12px 14px; gap: 8px; }
      .ph-title  { font-size: 13px; }
    }
  </style>
</head>
<body>

<!-- ── NAV ── -->
<nav class="nav">
  <a class="nav-brand" href="index.html">
    <span class="nav-logo">CAT<span>.</span>prep</span>
  </a>
  <div class="nav-links">
    <a href="index.html"      class="nav-link">Dashboard</a>
    <a href="tracker.html"   class="nav-link active">QA Tracker</a>
    <a href="intel.html"     class="nav-link">Exam Intel</a>
    <a href="predictor.html" class="nav-link">Call Predictor</a>
  </div>
  <div class="nav-right">
    <span class="nav-pulse"></span>
    <span class="nav-clock js-clock">--:--:--</span>
  </div>
</nav>

<!-- ── PAGE ── -->
<main class="page">

  <div class="page-header">
    <h1>CAT Quant <span>2025</span></h1>
    <p>Quantitative Aptitude — Full Course Tracker · 384 videos across 7 phases</p>
  </div>

  <!-- Global stats -->
  <div class="tracker-cards">
    <div class="tracker-card">
      <div class="tc-label"><span class="tc-dot tc-dot-amber"></span>Videos Completed</div>
      <div class="tc-numbers">
        <div class="tc-big tc-big-amber" id="vid-done">0</div>
        <div class="tc-slash">/</div>
        <div class="tc-total" id="vid-total">384</div>
        <div class="tc-unit">videos</div>
      </div>
      <div class="tc-bar-track"><div class="tc-bar-fill tc-bar-amber" id="vid-bar" style="width:0%"></div></div>
      <div class="tc-sub"><strong id="vid-pct">0%</strong> done · <strong id="vid-left">384</strong> remaining</div>
    </div>
    <div class="tracker-card">
      <div class="tc-label"><span class="tc-dot tc-dot-teal"></span>Watch Time Completed</div>
      <div class="tc-numbers">
        <div class="tc-big tc-big-teal" id="time-done">0h</div>
        <div class="tc-slash">/</div>
        <div class="tc-total" id="time-total">—</div>
        <div class="tc-unit">hrs</div>
      </div>
      <div class="tc-bar-track"><div class="tc-bar-fill tc-bar-teal" id="time-bar" style="width:0%"></div></div>
      <div class="tc-sub"><strong id="time-pct">0%</strong> done · <strong id="time-left">—</strong> remaining</div>
    </div>
  </div>

  <div class="top-actions">
    <button class="reset-btn" onclick="resetAll()">↺ Reset all progress</button>
  </div>

  <!-- Phase filter -->
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">All phases</button>
    <button class="filter-btn" onclick="setFilter('0',this)">Phase 0</button>
    <button class="filter-btn" onclick="setFilter('1',this)">Phase 1</button>
    <button class="filter-btn" onclick="setFilter('2',this)">Phase 2</button>
    <button class="filter-btn" onclick="setFilter('3',this)">Phase 3</button>
    <button class="filter-btn" onclick="setFilter('4',this)">Phase 4</button>
    <button class="filter-btn" onclick="setFilter('5',this)">Phase 5</button>
    <button class="filter-btn" onclick="setFilter('6',this)">Phase 6</button>
  </div>

  <div id="tracker"></div>

</main>

<script src="js/countdown.js"></script>
<script src="js/data.js"></script>
<script src="js/tracker.js"></script>
<script>
  // Live clock in nav
  function tickClock() {
    const now = new Date();
    const s = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
    document.querySelectorAll('.js-clock').forEach(el => el.textContent = s);
  }
  tickClock(); setInterval(tickClock, 1000);

  initTracker();

  (function(){
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="7" fill="#09090e"/><text x="16" y="22" font-family="monospace" font-weight="700" font-size="14" fill="#e05555" text-anchor="middle">CAT</text></svg>`;
    const link = document.createElement("link"); link.rel="icon"; link.type="image/svg+xml";
    link.href="data:image/svg+xml,"+encodeURIComponent(svg); document.head.appendChild(link);
  })();
</script>
</body>
</html>
